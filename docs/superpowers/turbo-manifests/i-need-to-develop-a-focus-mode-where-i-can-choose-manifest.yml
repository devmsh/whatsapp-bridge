schema_version: 1
task_brief: |
  I need to develop a "FOCUS MODE" where I can choose a Circle or Sub-circle, and see a fully redesigned home page that keeps me on top of everything — not the chat list normally shown in the main tab.

  Decided requirements (from prior user brainstorming — do not re-litigate, these are fixed constraints):

  1. NAMING COLLISION TO RESOLVE: the string "focus mode" is already used in web/src/explorer/WorkingHours.tsx (~line 167) to describe the working-hours auto-mute feature ("Selected chats are muted during working hours (focus mode)"). Rename that existing label (e.g. to "quiet hours" or "auto-mute") so "Focus Mode" refers only to the new per-circle dashboard feature.

  2. DASHBOARD CONTENT (all four required for v1, combined into one custom layout):
     a. Circle-scoped digest/briefing: reuse the existing global Briefing engine (internal/api/handler_briefings.go: buildBriefing/enrichBriefing) but scoped to just this circle's chats (via FlattenCircleChats in internal/circles.go) — overdue tasks, today's tasks, signal-rich chats, DMs awaiting reply, for this circle only.
     b. Filtered chat list: this circle's chats (via FlattenCircleChats) with unread/mention state preserved, same semantics as web/src/explorer/ChatList.tsx today.
     c. Task board: this circle's extracted tasks (existing pipeline: internal/api/handler_extract.go, tasks/task_circles tables), grouped parent/child, with inline accept/reject/mark-done actions (reuse/adapt web/src/explorer/TasksPanel.tsx and TasksSidebar.tsx which already support circle filtering).
     d. AI profile/purpose panel: the circle's entity_profiles "purpose" description, tags, and member list (reuse the pattern from web/src/explorer/Dashboard.tsx's DashboardModal, which today only shows this per-contact).

  3. ENTRY POINT: a persistent, always-visible top-level switcher control near the tab bar (not buried in the Circles tab) that lets the user (a) enter Focus Mode for any circle from anywhere in the app, and (b) switch which circle they're focused on WITHOUT leaving Focus Mode.

  4. TAKEOVER SCOPE: full takeover. While Focus Mode is active, the normal tab bar (chats|contacts|circles|tasks|calls in web/src/explorer/Explorer.tsx) is hidden/replaced by an "Exit Focus" control. Exiting returns to whichever normal tab was active before.

  5. SUB-CIRCLE HIERARCHY: circles can nest (circle_members with member_type='circle'; FlattenCircleChats resolves a circle + all descendants). Focusing a parent circle shows the FLATTENED view by default. Add a breadcrumb/drill-down control to narrow into one specific sub-circle's own narrower view without leaving Focus Mode.

  6. PERSISTENCE: remember the last-focused circle (e.g. localStorage) so relaunching the app reopens Focus Mode on that same circle. The switcher (#3) must make it trivial to change circles at any time.

  7. CIRCLE MANAGEMENT FOLD-IN: the existing web/src/explorer/CircleView.tsx (rename circle, members list, keyword-based member suggestions, create sub-circle, run task extraction + history, export-as-zip via internal/api/handler_circle_export.go, CircleSettings.tsx keywords/notes) becomes a "Manage" panel/icon reachable from inside Focus Mode. CircleView.tsx as a standalone screen goes away; its functionality is absorbed into Focus Mode.

  8. CHAT THREAD INTERACTION: tapping a chat in the Focus Mode chat list opens the thread INLINE, split-view alongside the dashboard (dashboard/list as a sidebar, thread rendered next to it) — you never fully leave Focus Mode to read/reply to a chat.

  9. DIGEST FRESHNESS (INCREMENTAL, NOT DAILY-BATCH): unlike the existing global Briefing (runs once daily), the circle-scoped digest must refresh incrementally: after ~10 new messages have arrived in the circle's chats since the last digest run, trigger a refresh. Do NOT reanalyze the whole circle history from scratch — feed the LLM enrichment step the PREVIOUS digest output + the new messages (optionally overlapping a few prior messages for context continuity). Needs new backend logic (per-circle "last digest" cache + message-count-since-last-digest tracking + incremental prompt construction), likely adapting internal/api/handler_briefings.go's enrichBriefing.

  Media understanding surfacing (image/voice transcripts) was explicitly considered and NOT selected as a v1 dashboard block — do not add it as a feature.
slug: i-need-to-develop-a-focus-mode-where-i-can-choose
created: 2026-07-01
strategy: |
  Four iterations, weight-bound (39 total sized weight, 12/iter cap forces at least four). The plan is anchored on the two genuinely hot React files — Explorer.tsx (its four writers shell / switcher / persistence / foldin) and FocusMode.tsx (its four writers shell / inline-thread / persistence / drilldown) — assigning exactly one writer of each hot file per iteration so no wave ever collides on them. Iter 1 lands the takeover shell plus two low-risk dashboard blocks (filtered chat list, profile panel) and the naming rename, giving an immediately demoable v1; each later iter plugs new panels and interactions onto the already-merged shell seam, so iter N+1 always compiles against iter N. The heavy Go-only incremental-digest backend is paired with its UI in one iter (they share no files) and the circle-management fold-in is sequenced last so it retires CircleView.tsx against a stable Focus Mode surface.
constraints_honored:
  - "At most 4 features per iteration (max is 3 in every iter)."
  - "Total sized weight <= 12 per iteration (i1=8, i2=12, i3=10, i4=9)."
  - "Exactly one writer of hot file Explorer.tsx per iter: shell(i1), switcher(i2), persistence(i3), foldin(i4)."
  - "Exactly one writer of hot file FocusMode.tsx per iter: shell(i1), inline-thread(i2), persistence(i3), drilldown(i4)."
  - "Exactly one writer of FocusSwitcher.tsx per iter: switcher(i2), drilldown(i4)."
  - "Dependency order respected: shell first; chat-list before inline-thread; digest-backend before/with digest-ui; switcher before drilldown; foldin after a stable shell."
  - "Every iteration is a demoable v1 within one turbo cycle; no stretch/filler iter; no external integrations added; media-understanding block deliberately excluded."
  - "Each iter compiles against the merged output of the previous iter (no N depends-on N+2)."
